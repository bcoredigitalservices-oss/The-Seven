version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: traveluser
      POSTGRES_PASSWORD: travelpassword
      POSTGRES_DB: seven
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8006:8000"
    environment:
      - DATABASE_URL=postgresql://traveluser:travelpassword@db:5432/seven
      - FRONTEND_URL=https://seven.bcore.digital
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=your-email@gmail.com
      - SMTP_PASSWORD=your-app-password
      - RESEND_API_KEY=your_resend_api_key
    volumes:
      - backend_data:/app/data
    restart: unless-stopped
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3006:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://seven.bcore.digital/api
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  backend_data:
  pgdata:
